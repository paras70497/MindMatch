<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MindMatch - Question Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#444748",
                    "on-tertiary-fixed-variant": "#005229",
                    "surface-dim": "#111317",
                    "on-tertiary-container": "#00743c",
                    "tertiary": "#ffffff",
                    "primary": "#ffffff",
                    "inverse-primary": "#5d5f5f",
                    "on-surface-variant": "#c4c7c8",
                    "tertiary-fixed-dim": "#60de8c",
                    "on-error-container": "#ffdad6",
                    "on-primary-container": "#636565",
                    "error-container": "#93000a",
                    "on-secondary-container": "#b5b8c5",
                    "surface-container-lowest": "#0c0e12",
                    "surface-container-low": "#1a1c20",
                    "on-primary-fixed-variant": "#454747",
                    "surface-container-highest": "#333539",
                    "primary-fixed": "#e2e2e2",
                    "error": "#ffb4ab",
                    "on-secondary-fixed-variant": "#434752",
                    "on-background": "#e2e2e8",
                    "tertiary-fixed": "#7efba6",
                    "surface-tint": "#c6c6c7",
                    "primary-fixed-dim": "#c6c6c7",
                    "on-primary-fixed": "#1a1c1c",
                    "secondary-fixed-dim": "#c3c6d4",
                    "on-tertiary": "#00391a",
                    "on-error": "#690005",
                    "surface-container": "#1e2024",
                    "on-surface": "#e2e2e8",
                    "secondary-fixed": "#dfe2f0",
                    "on-secondary-fixed": "#171b25",
                    "on-primary": "#2f3131",
                    "surface-bright": "#37393e",
                    "secondary": "#c3c6d4",
                    "background": "#111317",
                    "outline": "#8e9192",
                    "on-secondary": "#2c303b",
                    "surface-variant": "#333539",
                    "secondary-container": "#454954",
                    "tertiary-container": "#7efba6",
                    "on-tertiary-fixed": "#00210d",
                    "inverse-on-surface": "#2f3035",
                    "primary-container": "#e2e2e2",
                    "inverse-surface": "#e2e2e8",
                    "surface": "#111317",
                    "surface-container-high": "#282a2e"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "xs": "4px",
                    "xl": "40px",
                    "2xl": "64px",
                    "container-max": "1200px",
                    "gutter": "24px",
                    "sm": "8px",
                    "md": "16px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "headline-lg": ["Inter"],
                    "label-caps": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "display": ["Inter"],
                    "body-md": ["Inter"],
                    "label-md": ["Inter"]
            },
            "fontSize": {
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.03em", "fontWeight": "600"}],
                    "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "display": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .answer-card {
            background-color: theme('colors.surface-container');
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .answer-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .answer-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            background-color: theme('colors.surface-container-high');
        }
        .answer-card:hover::before {
            opacity: 1;
        }
        .answer-card:active {
            transform: scale(0.98);
        }
        .progress-bar-fill {
            transition: width 0.5s ease-in-out;
        }
        
        /* Premium subtle metallic sheen for surface */
        .surface-metallic {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.02) 0%, transparent 100%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden bg-background">
<!-- Ambient Background Glow -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center">
<div class="w-[800px] h-[800px] rounded-full bg-primary/5 blur-[120px] opacity-50"></div>
</div>
<!-- Top Navigation Shell Suppressed (Transactional Intent) -->
<!-- Navigation intentionally omitted per "The Destination Rule" and "Automatic Suppression" for Task-Focused/Linear screens -->
<main class="w-full max-w-[600px] px-lg md:px-2xl py-2xl relative z-10 flex flex-col items-center">
<!-- Header / Progress -->
<header class="w-full mb-2xl text-center">
<div class="flex flex-col items-center gap-md">
<span class="font-label-caps text-label-caps text-on-surface-variant tracking-widest uppercase">
                    Question 4 of 20
                </span>
<div class="w-full max-w-[200px] h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full progress-bar-fill" style="width: 20%;"></div>
</div>
</div>
</header>
<!-- Question Section -->
<section class="w-full text-center mb-2xl">
<h1 class="font-display text-display text-on-surface md:font-display md:text-display font-headline-lg-mobile text-headline-lg-mobile balance-text">
                How do you prefer to spend a Sunday morning?
            </h1>
</section>
<!-- Answers Section -->
<section class="w-full flex flex-col gap-md">
<button class="answer-card w-full p-xl rounded-xl text-left flex items-center justify-between group cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary/30">
<span class="font-headline-md text-headline-md text-on-surface group-hover:text-primary transition-colors">
                    Slow coffee &amp; a book
                </span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 duration-300">
                    arrow_forward
                </span>
</button>
<button class="answer-card w-full p-xl rounded-xl text-left flex items-center justify-between group cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary/30">
<span class="font-headline-md text-headline-md text-on-surface group-hover:text-primary transition-colors">
                    Out for a long hike
                </span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 duration-300">
                    arrow_forward
                </span>
</button>
<button class="answer-card w-full p-xl rounded-xl text-left flex items-center justify-between group cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary/30">
<span class="font-headline-md text-headline-md text-on-surface group-hover:text-primary transition-colors">
                    Sleeping in until noon
                </span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 duration-300">
                    arrow_forward
                </span>
</button>
<button class="answer-card w-full p-xl rounded-xl text-left flex items-center justify-between group cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary/30">
<span class="font-headline-md text-headline-md text-on-surface group-hover:text-primary transition-colors">
                    Planning the week ahead
                </span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 duration-300">
                    arrow_forward
                </span>
</button>
</section>
<!-- Optional Footer actions (like skip or back) could go here, but omitted to prioritize main action per prompt -->
<div class="mt-xl">
<button class="font-label-md text-label-md text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity flex items-center gap-sm">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>
                Previous
            </button>
</div>
</main>
<script>
        // Simple JS to simulate interaction and smooth transition intent
        document.querySelectorAll('.answer-card').forEach(card => {
            card.addEventListener('click', function() {
                // Remove active state from siblings
                document.querySelectorAll('.answer-card').forEach(c => {
                    c.style.opacity = '0.5';
                    c.style.pointerEvents = 'none';
                });
                
                // Highlight selected
                this.style.opacity = '1';
                this.style.borderColor = 'rgba(255, 255, 255, 0.5)';
                this.style.backgroundColor = 'rgba(255, 255, 255, 0.1)';
                
                // Simulate next state transition
                setTimeout(() => {
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.4s ease';
                    // In a real app, this would route to the next question
                    setTimeout(() => {
                        window.location.reload();
                    }, 500);
                }, 400);
            });
        });

        // Initialize progress bar width on load for a nice animation effect
        window.addEventListener('load', () => {
            const progressBar = document.querySelector('.progress-bar-fill');
            if(progressBar) {
                progressBar.style.width = '0%';
                setTimeout(() => {
                    progressBar.style.width = '20%';
                }, 100);
            }
        });
    </script>
</body></html>

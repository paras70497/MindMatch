<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MindMatch - Share Card</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#444748",
                        "on-tertiary-fixed-variant": "#005229",
                        "surface-dim": "#111317",
                        "on-tertiary-container": "#00743c",
                        "tertiary": "#ffffff",
                        "primary": "#ffffff",
                        "inverse-primary": "#5d5f5f",
                        "on-surface-variant": "#c4c7c8",
                        "tertiary-fixed-dim": "#60de8c",
                        "on-error-container": "#ffdad6",
                        "on-primary-container": "#636565",
                        "error-container": "#93000a",
                        "on-secondary-container": "#b5b8c5",
                        "surface-container-lowest": "#0c0e12",
                        "surface-container-low": "#1a1c20",
                        "on-primary-fixed-variant": "#454747",
                        "surface-container-highest": "#333539",
                        "primary-fixed": "#e2e2e2",
                        "error": "#ffb4ab",
                        "on-secondary-fixed-variant": "#434752",
                        "on-background": "#e2e2e8",
                        "tertiary-fixed": "#7efba6",
                        "surface-tint": "#c6c6c7",
                        "primary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed": "#1a1c1c",
                        "secondary-fixed-dim": "#c3c6d4",
                        "on-tertiary": "#00391a",
                        "on-error": "#690005",
                        "surface-container": "#1e2024",
                        "on-surface": "#e2e2e8",
                        "secondary-fixed": "#dfe2f0",
                        "on-secondary-fixed": "#171b25",
                        "on-primary": "#2f3131",
                        "surface-bright": "#37393e",
                        "secondary": "#c3c6d4",
                        "background": "#111317",
                        "outline": "#8e9192",
                        "on-secondary": "#2c303b",
                        "surface-variant": "#333539",
                        "secondary-container": "#454954",
                        "tertiary-container": "#7efba6",
                        "on-tertiary-fixed": "#00210d",
                        "inverse-on-surface": "#2f3035",
                        "primary-container": "#e2e2e2",
                        "inverse-surface": "#e2e2e8",
                        "surface": "#111317",
                        "surface-container-high": "#282a2e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xs": "4px",
                        "xl": "40px",
                        "2xl": "64px",
                        "container-max": "1200px",
                        "gutter": "24px",
                        "sm": "8px",
                        "md": "16px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "display": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.03em", "fontWeight": "600" }],
                        "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "display": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #111317; color: #e2e2e8; }
        .gradient-bg {
            background: radial-gradient(circle at 50% -20%, rgba(255, 255, 255, 0.15) 0%, rgba(17, 19, 23, 1) 70%);
        }
        .shimmer-text {
            background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(196,199,200,1) 50%, rgba(255,255,255,1) 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            to { background-position: 200% center; }
        }
        .circular-progress {
            stroke-dasharray: 283; /* 2 * pi * r (approx 45) */
            stroke-dashoffset: 22; /* 283 - (283 * 0.92) */
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            transition: stroke-dashoffset 1s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-md bg-background antialiased selection:bg-primary selection:text-on-primary">
<!-- Share Card Container (9:16 aspect ratio roughly) -->
<main class="relative w-full max-w-[400px] aspect-[9/16] bg-black border border-white/10 rounded-xl overflow-hidden shadow-[0_20px_40px_rgba(0,0,0,0.6)] flex flex-col items-center justify-between p-xl gradient-bg group">
<!-- Top Branding -->
<header class="w-full text-center mt-md z-10 flex flex-col items-center gap-sm">
<span class="material-symbols-outlined text-primary text-3xl opacity-90" style="font-variation-settings: 'FILL' 1;">psychology</span>
<h1 class="font-display text-headline-md tracking-tighter text-on-surface">MindMatch</h1>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest mt-xs">Compatibility Analysis</p>
</header>
<!-- Huge Match Score -->
<section class="relative flex flex-col items-center justify-center w-full my-auto z-10">
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- Circular Progress Track -->
<svg class="absolute inset-0 w-full h-full" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="45" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2"></circle>
<!-- Circular Progress Fill (92%) -->
<circle class="circular-progress drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]" cx="50" cy="50" fill="none" r="45" stroke="#ffffff" stroke-linecap="round" stroke-width="2"></circle>
</svg>
<div class="text-center flex flex-col items-center">
<span class="font-display text-display text-primary shimmer-text tracking-tighter" style="font-size: 80px; line-height: 1;">92<span class="text-headline-lg">%</span></span>
<span class="font-label-md text-label-md text-on-surface-variant mt-sm">Exceptional Match</span>
</div>
</div>
</section>
<!-- Category High Points -->
<section class="w-full flex flex-col gap-md z-10 mb-xl">
<!-- Data Point 1 -->
<div class="flex items-center justify-between border-b border-white/5 pb-sm">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant text-sm">hub</span>
<span class="font-body-md text-body-md text-on-surface-variant">Cognitive Alignment</span>
</div>
<span class="font-headline-md text-headline-md text-primary">96%</span>
</div>
<!-- Data Point 2 -->
<div class="flex items-center justify-between border-b border-white/5 pb-sm">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant text-sm">favorite</span>
<span class="font-body-md text-body-md text-on-surface-variant">Emotional Resonance</span>
</div>
<span class="font-headline-md text-headline-md text-primary">89%</span>
</div>
<!-- Data Point 3 -->
<div class="flex items-center justify-between pb-sm">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant text-sm">route</span>
<span class="font-body-md text-body-md text-on-surface-variant">Future Trajectory</span>
</div>
<span class="font-headline-md text-headline-md text-primary">94%</span>
</div>
</section>
<!-- Bottom Call to Action / Footer -->
<footer class="w-full text-center z-10 mt-auto">
<p class="font-label-caps text-label-caps text-on-surface-variant/60">Find your cognitive counterpart.</p>
</footer>
<!-- Decorative Ambient Glow Behind Content -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3/4 h-3/4 bg-white/5 blur-[80px] rounded-full pointer-events-none z-0 mix-blend-screen"></div>
</main>
<!-- Interactive Elements (Share/Download outside the card for context) -->
<div class="fixed bottom-xl flex gap-md opacity-0 animate-[fadeIn_1s_ease-out_1s_forwards]">
<button class="bg-primary text-on-primary font-label-md text-label-md px-lg py-sm rounded-full flex items-center gap-sm hover:opacity-90 transition-opacity drop-shadow-md">
<span class="material-symbols-outlined text-[18px]">ios_share</span> Share Story
        </button>
<button class="bg-transparent border border-outline-variant text-primary font-label-md text-label-md px-lg py-sm rounded-full flex items-center gap-sm hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-[18px]">download</span> Save Image
        </button>
</div>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<script>
        // Micro-interaction: Slight tilt effect on mouse move (desktop only)
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('main');
            
            if (window.matchMedia("(hover: hover) and (pointer: fine)").matches) {
                document.addEventListener('mousemove', (e) => {
                    const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                    const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                    card.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                });
                
                // Reset on leave
                document.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg)';
                    card.style.transition = 'transform 0.5s ease';
                });
                
                document.addEventListener('mouseenter', () => {
                    card.style.transition = 'none';
                });
            }
        });
    </script>
</body></html>
